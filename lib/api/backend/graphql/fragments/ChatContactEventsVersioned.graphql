fragment ChatContactEventsVersioned on ChatContactEventsVersioned {
    events {
        __typename
        contactId
        at
        ... on ChatContactPhoneRemovedEvent {
            phone {
                phone
                user {
                    __typename
                    ...User
                }
            }
        }
        ... on ChatContactFavoritedEvent {
            position
        }
        ... on ChatContactEmailAddedEvent {
            email {
                email
                user {
                    __typename
                    ...User
                }
            }
        }
        ... on ChatContactEmailRemovedEvent {
            email {
                email
                user {
                    __typename
                    ...User
                }
            }
        }
        ... on ChatContactCreatedEvent {
            name
        }
        ... on ChatContactGroupAddedEvent {
            group {
                __typename
                ...Chat
            }
        }
        ... on ChatContactNameUpdatedEvent {
            name
        }
        ... on ChatContactGroupRemovedEvent {
            groupId
        }
        ... on ChatContactUserAddedEvent {
            user {
                __typename
                ...User
            }
        }
        ... on ChatContactUserRemovedEvent {
            userId
        }
        ... on ChatContactPhoneAddedEvent {
            phone {
                phone
                user {
                    __typename
                    ...User
                }
            }
        }
    }
    ver
    listVer
}
