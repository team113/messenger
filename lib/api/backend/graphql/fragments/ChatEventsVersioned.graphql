fragment ChatEventsVersioned on ChatEventsVersioned {
    events {
        __typename
        chatId
        ... on ChatTotalItemsCountUpdatedEvent {
            count
        }
        ... on ChatCallMemberRedialedEvent {
            callId
            call {
                __typename
                ...ChatCall
            }
            user {
                __typename
                ...User
            }
            byUser {
                __typename
                ...User
            }
            at
        }
        ... on ChatClearedEvent {
            at
        }
        ... on ChatItemHiddenEvent {
            itemId
        }
        ... on ChatMutedEvent {
            duration {
                __typename
                ... on MuteUntilDuration {
                    until
                }
            }
        }
        ... on ChatTypingStartedEvent {
            user {
              __typename
              ...User
            }
        }
        ... on ChatTypingStoppedEvent {
            user {
              __typename
              ...User
            }
        }
        ... on ChatHiddenEvent {
            at
        }
        ... on ChatItemDeletedEvent {
            itemId
        }
        ... on ChatItemEditedEvent {
            itemId
            text {
                changed
            }
            attachments {
                changed {
                    __typename
                    ... on ImageAttachment {
                        ...ImageAttachment
                    }
                    ... on FileAttachment {
                        ...FileAttachment
                    }
                }
            }
            repliesTo {
                changed {
                    __typename
                    ... on ChatMessageQuote {
                        ...ChatMessageQuote
                    }
                    ... on ChatCallQuote {
                        ...ChatCallQuote
                    }
                    ... on ChatInfoQuote {
                        ...ChatInfoQuote
                    }
                }
            }
        }
        ... on ChatCallStartedEvent {
            callId
            call {
                __typename
                ...ChatCall
            }
        }
        ... on ChatUnreadItemsCountUpdatedEvent {
            count
        }
        ... on ChatCallFinishedEvent {
            callId
            call {
                __typename
                ...ChatCall
            }
            reason
            at
        }
        ... on ChatCallMemberLeftEvent {
            callId
            call {
                __typename
                ...ChatCall
            }
            user {
                __typename
                ...User
            }
            at
        }
        ... on ChatCallMemberJoinedEvent {
            callId
            call {
                __typename
                ...ChatCall
            }
            user {
                __typename
                ...User
            }
            at
        }
        ... on ChatLastItemUpdatedEvent {
            lastItem {
                node {
                    __typename
                    ... on ChatInfo {
                        ...ChatInfo
                    }
                    ... on ChatCall {
                        ...ChatCall
                    }
                    ... on ChatMessage {
                        ...ChatMessage
                    }
                    ... on ChatForward {
                        ...ChatForward
                    }
                }
                cursor
            }
        }
        ... on ChatDeliveredEvent {
            until
        }
        ... on ChatCallMovedEvent {
            callId
            call {
                __typename
                ...ChatCall
            }
            newChatId
            newChat {
                __typename
                ...Chat
            }
            newCallId
            newCall {
                __typename
                ...ChatCall
            }
            user {
                __typename
                ...User
            }
            at
        }
        ... on ChatReadEvent {
            byUser {
                __typename
                ...User
            }
            at
        }
        ... on ChatItemPostedEvent {
            item {
                node {
                    __typename
                    ... on ChatInfo {
                        ...ChatInfo
                    }
                    ... on ChatCall {
                        ...ChatCall
                    }
                    ... on ChatMessage {
                        ...ChatMessage
                    }
                    ... on ChatForward {
                        ...ChatForward
                    }
                }
                cursor
            }
        }
        ... on ChatCallDeclinedEvent {
            callId
            call {
                __typename
                ...ChatCall
            }
            user {
                __typename
                ...User
            }
            at
        }
        ... on ChatArchivedEvent {
            at
        }
        ... on ChatUnarchivedEvent {
            at
        }
        ... on ChatFavoritedEvent {
            position
            at
        }
        ... on ChatUnfavoritedEvent {
            at
        }
        ... on ChatCallConversationStartedEvent {
            callId
            call {
                __typename
                ...ChatCall
            }
            at
        }
        ... on ChatCallAnswerTimeoutPassedEvent {
            callId
            userId
        }
    }
    ver
}
