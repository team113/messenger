fragment ChatCallEventsVersioned on ChatCallEventsVersioned {
    events {
        __typename
        callId
        chatId
        at
        ... on ChatCallMemberRedialedEvent {
            call {
                __typename
                ...ChatCall
            }
            user {
                __typename
                ...User
            }
            byUser {
                __typename
                ...User
            }
        }
        ... on ChatCallMemberUndialedEvent {
            user {
                __typename
                ...User
            }
        }
        ... on ChatCallAnswerTimeoutPassedEvent {
            call {
                __typename
                ...ChatCall
            }
            nUser: user {
                __typename
                ...User
            }
            userId
        }
        ... on ChatCallFinishedEvent {
            call {
                __typename
                ...ChatCall
            }
            reason
        }
        ... on ChatCallRoomReadyEvent {
            call {
                __typename
                ...ChatCall
            }
            joinLink
        }
        ... on ChatCallMemberLeftEvent {
            call {
                __typename
                ...ChatCall
            }
            user {
                __typename
                ...User
            }
            deviceId
        }
        ... on ChatCallMemberJoinedEvent {
            call {
                __typename
                ...ChatCall
            }
            user {
                __typename
                ...User
            }
            deviceId
        }
        ... on ChatCallHandLoweredEvent {
            call {
                __typename
                ...ChatCall
            }
            user {
                __typename
                ...User
            }
            deviceId
        }
        ... on ChatCallMovedEvent {
            call {
                __typename
                ...ChatCall
            }
            newChatId
            newChat {
                __typename
                ...Chat
            }
            newCallId
            newCall {
                __typename
                ...ChatCall
            }
            user {
                __typename
                ...User
            }
        }
        ... on ChatCallHandRaisedEvent {
            call {
                __typename
                ...ChatCall
            }
            user {
                __typename
                ...User
            }
            deviceId
        }
        ... on ChatCallDeclinedEvent {
            call {
                __typename
                ...ChatCall
            }
            user {
                __typename
                ...User
            }
        }
        ... on ChatCallConversationStartedEvent {
            call {
                __typename
                ...ChatCall
            }
        }
    }
    ver
}
