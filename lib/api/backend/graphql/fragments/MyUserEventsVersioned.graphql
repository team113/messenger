fragment MyUserEventsVersioned on MyUserEventsVersioned {
    events {
        __typename
        ... on UserAvatarRemovedEvent {
            userId
            at
        }
        ... on UserAvatarUpdatedEvent {
            userId
            avatar {
                __typename
                ...UserAvatar
            }
            at
        }
        ... on UserBioRemovedEvent {
            userId
            at
        }
        ... on UserBioUpdatedEvent {
            userId
            bio
            at
        }
        ... on UserCallCoverRemovedEvent {
            userId
            at
        }
        ... on UserCallCoverUpdatedEvent {
            userId
            callCover {
                __typename
                ...UserCallCover
            }
            at
        }
        ... on UserDeletedEvent {
            userId
            at
        }
        ... on UserEmailAddedEvent {
            userId
            email
            at
            confirmed
        }
        ... on UserEmailRemovedEvent {
            userId
            email
            at
        }
        ... on UserLoginRemovedEvent {
            userId
            at
        }
        ... on UserLoginUpdatedEvent {
            userId
            login
            at
        }
        ... on UserMutedEvent {
            userId
            until {
                __typename
                ... on MuteUntilDuration {
                    until
                }
            }
        }
        ... on UserNameRemovedEvent {
            userId
            at
        }
        ... on UserNameUpdatedEvent {
            userId
            name
            at
        }
        ... on UserCameOnlineEvent {
            userId
        }
        ... on UserCameOfflineEvent {
            userId
            at
        }
        ... on UserPasswordUpdatedEvent {
            userId
            at
        }
        ... on UserPhoneAddedEvent {
            userId
            phone
            at
            confirmed
        }
        ... on UserPhoneRemovedEvent {
            userId
            phone
            at
        }
        ... on UserPresenceUpdatedEvent {
            userId
            presence
            at
        }
        ... on UserStatusRemovedEvent {
            userId
            at
        }
        ... on UserStatusUpdatedEvent {
            userId
            status
            at
        }
        ... on UserUnmutedEvent {
            userId
        }
        ... on UserUnreadChatsCountUpdatedEvent {
            userId
            count
        }
        ... on UserWelcomeMessageDeletedEvent {
            userId
            at
        }
        ... on UserWelcomeMessageUpdatedEvent {
            userId
            text {
                changed
            }
            attachments {
                changed {
                    __typename
                    ... on ImageAttachment {
                        ...ImageAttachment
                    }
                    ... on FileAttachment {
                        ...FileAttachment
                    }
                }
            }
            at
        }
    }
    ver
}
